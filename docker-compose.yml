services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3009:3000"
    env_file:
      - ./apps/web/.env.local
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
      - ./apps/web/next.config.ts:/app/next.config.ts
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8009:8000"
    env_file:
      - ./apps/api/.env.development
    depends_on:
      miniflare:
        condition: service_healthy
    volumes:
      - ./apps/api/app:/app/app
      - api-uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  miniflare:
    build:
      context: ./packages/miniflare
      dockerfile: Dockerfile
    ports:
      - "8788:8788"
    environment:
      - WRANGLER_SEND_METRICS=false
    volumes:
      - ./miniflare-state:/app/.wrangler/state
      - ./packages/db/schema.sql:/app/schema.sql:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8788/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    restart: unless-stopped

volumes:
  api-uploads:
  miniflare-state:
